<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST-MARKET v.9002 // AUTO-REPAIR</title>
    <style>
        :root { --red: #ff0000; --green: #00ff41; --bg: #000; --white: #fff; --gray: #1a1a1a; }
        body { background: var(--bg); color: var(--white); font-family: 'Courier New', monospace; margin: 0; }
        header { border-bottom: 1px solid var(--gray); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: #050505; }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { border: 1px solid var(--gray); background: #0a0a0a; padding: 20px; text-align: center; border-top: 3px solid var(--white); position: relative; }
        .pro-img { width: 100%; height: 300px; object-fit: contain; margin-bottom: 15px; background: #050505; display: block; }
        .price { font-size: 26px; color: var(--green); margin: 15px 0; font-weight: bold; }
        .btn { border: 1px solid #444; color: #fff; padding: 12px; background: none; cursor: pointer; width: 100%; font-weight: bold; text-transform: uppercase; }
        .btn:hover { border-color: var(--red); color: var(--red); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: #000; border: 2px solid var(--red); padding: 30px; width: 340px; text-align: center; }
        .input-gh { width: 100%; padding: 14px; margin: 10px 0; background: #111; border: 1px solid var(--gray); color: #fff; box-sizing: border-box; }
        .hidden { display: none !important; }
        .status-dot { height: 10px; width: 10px; background-color: var(--green); border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

<header>
    <div style="letter-spacing: 2px;">GHOST-MARKET <span style="color: var(--red);">v.9002</span></div>
    <div id="status"><span class="status-dot"></span> System Live</div>
    <button class="btn" style="width: auto; padding: 5px 15px;" onclick="openAuth()">[ DOKS v.3.0 ]</button>
</header>

<div class="container" id="view-public">
    <div class="grid">
        <div class="card">
            <img src="https://hc3z4j.webwave.dev/lib/hc3z4j/slowik_na_kolanach-m1ztp7it.jpg" alt="Slowik" class="pro-img" onerror="this.src='https://via.placeholder.com/300x300?text=FOTO+SLOWIK'">
            <h3>KOSZULKA "SŁOWIK" V1</h3>
            <div class="price">89,00 PLN</div>
            <button class="btn" onclick="openAuth()">DODAJ DO KOSZYKA</button>
        </div>
        <div class="card">
            <img src="https://hc3z4j.webwave.dev/lib/hc3z4j/koszulka_kosciul_satanistow-m1ztp8u1.jpg" alt="Satanistow" class="pro-img" onerror="this.src='https://via.placeholder.com/300x300?text=FOTO+KOSCIOL'">
            <h3>"KOŚCIÓŁ SATANISTÓW"</h3>
            <div class="price">95,00 PLN</div>
            <button class="btn" onclick="openAuth()">DODAJ DO KOSZYKA</button>
        </div>
    </div>
</div>

<div class="container hidden" id="view-op">
    <h2 style="color: var(--green); border-bottom: 2px solid var(--green); padding-bottom: 10px;">PRODUKTY OPERACYJNE ODBLOKOWANE</h2>
    <div class="grid">
        <div class="card" style="border-color: var(--green);">
            <h3>[LQ] GHOST-LIQUID</h3>
            <div class="price">130,00 PLN</div>
            <button class="btn" style="color: var(--green); border-color: var(--green);">ZAMÓW</button>
        </div>
        <div class="card" style="border-color: var(--green);">
            <h3>CZESKI MERCH [PRO]</h3>
            <div class="price">250,00 PLN</div>
            <button class="btn" style="color: var(--green); border-color: var(--green);">ZAMÓW</button>
        </div>
    </div>
</div>

<div id="modal-auth" class="overlay">
    <div class="modal">
        <h3 id="auth-title">AUTORYZACJA KLIENTA</h3>
        <div id="step-1">
            <input type="text" id="phone" class="input-gh" placeholder="NUMER (+48...)">
            <button class="btn" style="background: var(--red); color: #000; border: none;" onclick="sendCode()">POBIERZ KOD SMS</button>
        </div>
        <div id="step-2" class="hidden">
            <input type="text" id="sms-code" class="input-gh" placeholder="KOD Z SMS">
            <button class="btn" style="background: var(--green); color: #000; border: none;" onclick="checkCode()">WERYFIKUJ</button>
        </div>
        <button class="btn" style="border: none; margin-top: 15px; font-size: 10px;" onclick="closeAuth()">ANULUJ</button>
    </div>
</div>

<script>
    // Klucze Twilio - pocięte dla bezpieczeństwa
    const _s = "ACf2dc403aa3d96" + "d222c081b93f73ac5e6"; 
    const _t = "cb14d220bdffcab2" + "03b64c2afda8d425";
    const _f = "+17124" + "236283"; // Nadawca Twilio
    const _w = "https://discord.com/api/webhooks/1483238307268661380/L-q3uhMziz1753tB9GBSHSd_SYDJn0Poule_Dq-3vom05h3PDN0_jzBSNBehY7dR9EQe";

    let verifyCode = "";

    function openAuth() { document.getElementById('modal-auth').style.display = 'flex'; }
    function closeAuth() { document.getElementById('modal-auth').style.display = 'none'; }

    async function sendCode() {
        const num = document.getElementById('phone').value;
        if(!num) return alert("Wpisz numer!");
        
        verifyCode = Math.floor(1000 + Math.random() * 9000).toString();
        
        try {
            const response = await fetch(`https://api.twilio.com/2010-04-01/Accounts/${_s}/Messages.json`, {
                method: 'POST',
                headers: {
                    'Authorization': 'Basic ' + btoa(_s + ':' + _t),
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: new URLSearchParams({ 'To': num, 'From': _f, 'Body': '[GHOST-MARKET] Kod weryfikacyjny: ' + verifyCode })
            });

            if(response.ok) {
                document.getElementById('step-1').classList.add('hidden');
                document.getElementById('step-2').classList.remove('hidden');
                document.getElementById('auth-title').innerText = "WPISZ KOD";
                
                // Raport na Discord
                fetch(_w, { method: 'POST', headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ content: `📡 **PRÓBA LOGOWANIA**: Numer ${num}` }) 
                });
            } else { alert("Błąd Twilio. Sprawdź saldo $8.23."); }
        } catch(e) { alert("Błąd połączenia. Spróbuj ponownie."); }
    }

    function checkCode() {
        if(document.getElementById('sms-code').value === verifyCode) {
            closeAuth();
            document.getElementById('view-public').classList.add('hidden');
            document.getElementById('view-op').classList.remove('hidden');
            alert("DOSTĘP DO PRODUKTÓW OPERACYJNYCH ODBLOKOWANY.");
        } else { alert("ZŁY KOD!"); }
    }
</script>
</body>
</html>
